<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medusa Capital — Holdings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <div class="nav-logo"><svg viewBox="0 0 16 16"><path d="M8 1.5L1.5 6v9h4v-5h5v5h4V6L8 1.5z"/></svg></div>
      <div class="nav-brand-text">
        <div class="nav-brand-name">Medusa Capital</div>
        <div class="nav-brand-sub">#230-32415</div>
      </div>
    </div>
    <div class="nav-links">
      <a href="index.html">Overview</a>
      <a href="positions.html" class="active">Holdings</a>
      <a href="transactions.html">Activity</a>
      <a href="income.html">Income</a>
      <a href="upload.html">Upload</a>
    </div>
    <button class="nav-hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </nav>
  <div class="nav-drawer" id="nav-drawer">
    <a href="index.html">Overview</a>
    <a href="positions.html" class="active">Holdings</a>
    <a href="transactions.html">Activity</a>
    <a href="income.html">Income</a>
    <a href="upload.html">Upload</a>
  </div>

  <main class="container">
    <div class="page-header">
      <div>
        <h1>Holdings</h1>
        <p class="subtitle" id="subtitle">Loading…</p>
      </div>
      <div class="filter-bar">
        <select id="filter-currency"><option value="all">All</option><option value="CAD">CAD</option><option value="USD">USD</option></select>
        <select id="filter-sector"><option value="all">All Sectors</option></select>
        <select id="sort-by">
          <option value="current_value_cad">Sort: Value</option>
          <option value="pf_weight">Sort: Weight</option>
          <option value="return_inception">Sort: Return</option>
          <option value="ticker">Sort: Ticker</option>
        </select>
      </div>
    </div>

    <!-- Card view on mobile, table on desktop -->
    <div id="holdings-cards" class="holding-list"></div>

    <div class="card" style="display:none" id="holdings-table-card">
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>Ticker</th><th>Name</th><th>Sector</th>
            <th class="num">Shares</th><th class="num">Cost/Sh</th>
            <th class="num">Price</th><th class="num">Value</th>
            <th class="num">CAD</th><th class="num">Weight</th>
            <th class="num">Return</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <div class="bnav-items">
      <a href="index.html" class="bnav-item"><div class="bnav-icon"><svg viewBox="0 0 20 20" fill="none"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1h-4v-4H8v4H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></div>Overview</a>
      <a href="positions.html" class="bnav-item active"><div class="bnav-icon"><svg viewBox="0 0 20 20" fill="none"><rect x="3" y="5" width="14" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 5V4a3 3 0 016 0v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>Holdings</a>
      <a href="transactions.html" class="bnav-item"><div class="bnav-icon"><svg viewBox="0 0 20 20" fill="none"><path d="M3 13l4-4 3 3 4-5 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>Activity</a>
      <a href="income.html" class="bnav-item"><div class="bnav-icon"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 7v6M8 9h3a1 1 0 010 2H9a1 1 0 000 2h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>Income</a>
      <a href="upload.html" class="bnav-item"><div class="bnav-icon"><svg viewBox="0 0 20 20" fill="none"><path d="M10 13V7m0 0L7 10m3-3l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 14v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>Upload</a>
    </div>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script>
    document.getElementById('hamburger').addEventListener('click', () => document.getElementById('nav-drawer').classList.toggle('open'));
    let all = [];
    const isMobile = () => window.innerWidth < 768;

    function renderCards(positions) {
      const el = document.getElementById('holdings-cards');
      const tableCard = document.getElementById('holdings-table-card');
      if (!positions.length) {
        el.innerHTML = '<div class="card" style="text-align:center;color:var(--text-muted);padding:32px">No holdings found.</div>';
        tableCard.style.display = 'none';
        return;
      }
      if (isMobile()) {
        el.style.display = 'flex';
        tableCard.style.display = 'none';
        el.innerHTML = positions.map(p => `
          <div class="holding-row">
            <div class="holding-left">
              <div class="holding-icon ${p.currency === 'CAD' ? 'cad' : ''}">${p.ticker.slice(0,4)}</div>
              <div style="min-width:0">
                <div class="holding-name">${p.ticker} <span style="font-weight:400;color:var(--text-muted);font-size:11px">${p.currency}</span></div>
                <div class="holding-meta">${p.shares} sh · ${p.sector || ''}</div>
              </div>
            </div>
            <div class="holding-right">
              <div class="holding-val">${formatCAD(p.current_value_cad)}</div>
              <div class="holding-ret ${(p.return_inception || 0) >= 0 ? 'pos' : 'neg'}">${formatPct(p.return_inception)}</div>
            </div>
          </div>`).join('');
      } else {
        el.style.display = 'none';
        tableCard.style.display = 'block';
        document.getElementById('tbody').innerHTML = positions.map(p => `
          <tr>
            <td><span class="ticker-badge ${p.currency}">${p.ticker}</span></td>
            <td class="desc">${p.name}</td>
            <td><span class="sector-tag">${p.sector || '—'}</span></td>
            <td class="num">${p.shares}</td>
            <td class="num">${p.currency === 'CAD' ? formatCAD(p.cost_per_share) : formatUSD(p.cost_per_share)}</td>
            <td class="num">${p.currency === 'CAD' ? formatCAD(p.current_price) : formatUSD(p.current_price)}</td>
            <td class="num">${p.currency === 'CAD' ? formatCAD(p.current_value) : formatUSD(p.current_value)}</td>
            <td class="num">${formatCAD(p.current_value_cad)}</td>
            <td class="num">${p.pf_weight != null ? (p.pf_weight * 100).toFixed(1) + '%' : '—'}</td>
            <td class="num ${(p.return_inception || 0) >= 0 ? 'positive' : 'negative'}">${formatPct(p.return_inception)}</td>
          </tr>`).join('');
      }
    }

    function applyFilters() {
      const cur = document.getElementById('filter-currency').value;
      const sec = document.getElementById('filter-sector').value;
      const sort = document.getElementById('sort-by').value;
      let filtered = all.filter(p => cur === 'all' || p.currency === cur).filter(p => sec === 'all' || p.sector === sec);
      filtered.sort((a, b) => sort === 'ticker' ? a.ticker.localeCompare(b.ticker) : (b[sort] || 0) - (a[sort] || 0));
      renderCards(filtered);
    }

    async function init() {
      all = await Data.positions();
      const snap = await Data.latestSnapshot();
      document.getElementById('subtitle').textContent = snap
        ? all.length + ' holdings · ' + formatDate(snap.date)
        : 'No data — upload a statement';
      const sectors = [...new Set(all.map(p => p.sector).filter(Boolean))].sort();
      const sel = document.getElementById('filter-sector');
      sectors.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
      ['filter-currency','filter-sector','sort-by'].forEach(id => document.getElementById(id).addEventListener('change', applyFilters));
      window.addEventListener('resize', applyFilters);
      applyFilters();
    }
    init();
  </script>
</body>
</html>
